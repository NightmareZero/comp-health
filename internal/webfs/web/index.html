<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comp Health</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="header">
    <div class="logo">
      <svg class="logo-icon" width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="30" height="30" rx="7" fill="var(--accent)"/>
        <polyline points="4,15 9,9 14,20 19,11 26,15"
          fill="none" stroke="white" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">Comp Health</span>
    </div>
    <button class="theme-btn" id="themeToggle" title="切换主题">
      <!-- 太阳图标：深色模式下显示 -->
      <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- 月亮图标：亮色模式下显示 -->
      <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main class="main">
    <!-- 整体状态 Banner -->
    <section id="overallBanner" class="banner banner-loading">
      <span class="banner-icon" id="bannerIcon">⏳</span>
      <div class="banner-text">
        <div class="banner-title" id="bannerTitle">正在加载…</div>
        <div class="banner-sub"  id="bannerSub">请稍候</div>
      </div>
    </section>

    <!-- 服务列表 -->
    <section class="services-section">
      <div class="section-header">
        <h2 class="section-title">系统状态</h2>
        <span class="last-updated" id="lastUpdated"></span>
      </div>
      <div id="serviceList" class="service-list">
        <div class="loading-placeholder">正在加载数据…</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
