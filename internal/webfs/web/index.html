<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comp Health</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>
          <h1 id="appTitle">Comp Health</h1>
          <p class="subtitle">统一健康探测与状态总览</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="range-switch" id="rangeSwitch">
          <button class="range-btn active" data-range="6h">6h</button>
          <button class="range-btn" data-range="12h">12h</button>
          <button class="range-btn" data-range="3d">3d</button>
          <button class="range-btn" data-range="7d">7d</button>
        </div>
        <button id="themeToggle" class="theme-toggle" aria-label="切换主题">🌙</button>
      </div>
    </header>

    <main>
      <section class="hero-card">
        <div>
          <p class="eyebrow">整体状态</p>
          <h2 id="overallBanner">加载中...</h2>
          <p id="lastUpdated">等待首次刷新</p>
        </div>
      </section>

      <section class="services-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">服务健康</p>
            <h3>探针列表</h3>
          </div>
        </div>
        <div id="serviceList" class="service-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
